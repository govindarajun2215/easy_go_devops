<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>easy_go_devops • YouTube Channel</title>
  <meta name="description" content="DevOps made simple — Kubernetes, GitLab CI/CD, Docker, Helm, AKS, troubleshooting and automation by easy_go_devops." />

  <!-- Favicon from your logo -->
  <link rel="icon" type="image/jpeg" href="channels4_profile.jpg" />
  <link rel="apple-touch-icon" href="channels4_profile.jpg" />

  <style>
    :root {
      --bg: #0b0f17;
      --bg-2: #0e1422;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.12);
      --text: #e6edf3;
      --muted: #9aa4b2;
      --accent: #00e5a8;
      --accent-2: #4cc9f0;
      --header-h: 66px;
    }
    [data-theme="light"]{
      --bg: #f7f9fc;
      --bg-2: #eef2f8;
      --card: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.12);
      --text: #0c1220;
      --muted: #465363;
      --accent: #006d5b;
      --accent-2: #0f89c7;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 12% -10%, rgba(76,201,240,0.20) 0%, rgba(0,0,0,0) 40%),
        radial-gradient(1000px 500px at 90% 10%, rgba(0,229,168,0.18) 0%, rgba(0,0,0,0) 50%),
        var(--bg);
    }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 20;
      height: var(--header-h);
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(10,14,24,0.75), rgba(10,14,24,0.35));
      border-bottom: 1px solid var(--border);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px; height: 100%; }
    .flex { display: flex; align-items: center; justify-content: space-between; gap: 14px; height: 100%; }

    .brand { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .brand img {
      width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); object-fit: cover;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      background: #fff0;
    }
    .brand h1 { font-size: 1.05rem; margin: 0; letter-spacing: 0.2px; }

    nav a {
      color: var(--muted); text-decoration: none; margin-left: 16px; font-weight: 600;
    }
    nav a:hover { color: var(--text); }

    .toggle {
      appearance: none; border: 1px solid var(--border); background: var(--card);
      color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 600;
    }

    /* Hero */
    section[id] { scroll-margin-top: calc(var(--header-h) + 10px); }
    .hero {
      position: relative;
      padding: 46px 20px 10px;
      overflow: hidden;
      background:
        radial-gradient(900px 420px at 85% -20%, rgba(76,201,240,0.14) 0%, rgba(0,0,0,0) 70%),
        linear-gradient(180deg, rgba(18,24,38,0.55), rgba(18,24,38,0));
    }
    .hero-grid {
      max-width: 1180px; margin: 0 auto; display: grid; gap: 22px;
      grid-template-columns: 1.2fr 1fr;
    }
    @media (max-width: 980px){ .hero-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }
    .title { font-size: 2rem; line-height: 1.2; margin: 6px 0 8px; }
    .sub { color: var(--muted); line-height: 1.65; }
    .cta { margin-top: 14px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #071218; padding: 10px 14px; border-radius: 10px; font-weight: 700; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .btn.alt {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    .svg-wave {
      position: absolute; left: 0; right: 0; bottom: -1px; opacity: 0.5;
    }

    /* Sections */
    .section { padding: 28px 20px; }
    h2.sec { margin: 0 0 16px; font-size: 1.35rem; }
    .muted { color: var(--muted); }

    /* Videos */
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 1100px){ .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 680px){ .grid { grid-template-columns: 1fr; } }
    .video {
      border-radius: 14px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-2);
      aspect-ratio: 16 / 9;
    }
    iframe { width: 100%; height: 100%; display: block; border: 0; }

    /* Link cards */
    .links { display: grid; gap: 14px; grid-template-columns: repeat(3, 1fr); }
